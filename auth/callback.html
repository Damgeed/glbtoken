<!DOCTYPE html>
<script>
// Instantly redirect to root with hash preserved — no flash, no visible page
var hash = window.location.hash;
if (hash) {
  window.location.replace('/' + hash);
} else {
  // Check search params too
  var params = {};
  (window.location.search.substring(1)).split('&').forEach(function(p){
    if(!p)return;var ps=p.split('=');params[decodeURIComponent(ps[0])]=decodeURIComponent(ps.slice(1).join('='));
  });
  if (params.error) {
    window.location.replace('/login.html?error=' + encodeURIComponent(params.error_description || params.error));
  } else {
    window.location.replace('/');
  }
}
</script>
