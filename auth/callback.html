<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redirecting — GlbTOKEN</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/x-icon" href="../favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0B14;color:#cdd6f4;font-family:Inter,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.spinner{width:32px;height:32px;border:3px solid #313244;border-top-color:#F4B400;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#161822;border:1px solid #2a2b3d;border-radius:12px;padding:2rem;text-align:center;max-width:360px}
.card p{margin-top:1rem;color:#7f8490;font-size:0.9rem}
</style>
<script>
(function(){
  var h = window.location.hash.substring(1);
  if (!h) return;
  var p = new URLSearchParams(h);
  var idToken = p.get('id_token');
  if (!idToken) return;
  var API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:8000' : 'https://glbtoken-backend-production.up.railway.app';
  fetch(API_URL + '/api/auth/auth0/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:idToken})
  }).then(function(r){return r.json()}).then(function(d){
    if(d && d.token){
      localStorage.setItem('gt_token', d.token);
      localStorage.setItem('gt_user', JSON.stringify(d.user));
      window.location.replace('/dashboard.html');
    } else {
      window.location.replace('/login.html?error=' + encodeURIComponent(d.detail || 'Login failed'));
    }
  }).catch(function(e){
    window.location.replace('/login.html?error=Connection+failed');
  });
  setTimeout(function(){
    if (!localStorage.getItem('gt_token')) {
      window.location.replace('/login.html?error=Login+timed+out');
    }
  }, 12000);
})();
</script>
<script src="../script.js?v=192"></script>
</head>
<body>
<div class="card">
<div class="spinner"></div>
<p>Completing sign in...</p>
</div>
</body>
</html>
