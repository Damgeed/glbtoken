<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redirecting — GlbTOKEN</title>
<meta name="robots" content="noindex,nofollow" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://glbtoken-backend-production.up.railway.app https://*.auth0.com; img-src 'self'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
<link rel="icon" type="image/x-icon" href="../favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0B14;color:#cdd6f4;font-family:Inter,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.spinner{width:32px;height:32px;border:3px solid #313244;border-top-color:#F4B400;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#161822;border:1px solid #2a2b3d;border-radius:12px;padding:2rem;text-align:center;max-width:360px}
.card p{margin-top:1rem;color:#7f8490;font-size:0.9rem}
</style>
</head>
<body>
<div class="card">
<div class="spinner"></div>
<p>Completing sign in...</p>
</div>
<script>
(function() {
  var auth0Domain = null;
  var auth0ClientId = null;
  var API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:8000' : 'https://glbtoken-backend-production.up.railway.app';

  // Step 1: Read authorization code from URL query params
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var returnedState = params.get('state');
  var error = params.get('error');

  if (error) {
    window.location.replace('/login.html?error=' + encodeURIComponent(error));
    return;
  }

  if (!code) {
    window.location.replace('/login.html?error=no_auth_code');
    return;
  }

  // Step 2: Verify CSRF state
  var storedState = sessionStorage.getItem('gt_oauth_state');
  sessionStorage.removeItem('gt_oauth_state');
  if (storedState && returnedState && returnedState !== storedState) {
    window.location.replace('/login.html?error=state_mismatch');
    return;
  }

  // Step 3: Read stored PKCE verifier
  var codeVerifier = sessionStorage.getItem('gt_code_verifier');
  sessionStorage.removeItem('gt_code_verifier');
  if (!codeVerifier) {
    window.location.replace('/login.html?error=no_code_verifier');
    return;
  }

  // Step 4: Get Auth0 config from Railway (needs domain + client_id)
  fetch(API_URL + '/api/auth/auth0/config', {
    method: 'GET',
    headers: {'Content-Type': 'application/json'}
  }).then(function(r) { return r.json(); }).then(function(cfg) {
    if (!cfg.configured || !cfg.domain || !cfg.client_id) {
      window.location.replace('/login.html?error=Auth0+not+configured');
      return null;
    }
    auth0Domain = cfg.domain;
    auth0ClientId = cfg.client_id;

    // Step 5: Exchange authorization code for tokens via Auth0
    return fetch('https://' + auth0Domain + '/oauth/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        grant_type: 'authorization_code',
        client_id: auth0ClientId,
        code: code,
        code_verifier: codeVerifier,
        redirect_uri: window.location.origin + '/auth/callback.html'
      })
    });
  }).then(function(r) {
    if (!r) return null;
    if (!r.ok) {
      return r.json().then(function(e) {
        throw new Error(e.error_description || 'Token exchange failed');
      });
    }
    return r.json();
  }).then(function(tokens) {
    if (!tokens || !tokens.id_token) return;
    
    // Step 6: Exchange Auth0 id_token for GlbTOKEN JWT via Railway
    return fetch(API_URL + '/api/auth/auth0/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: tokens.id_token})
    });
  }).then(function(r) {
    if (!r) return;
    if (!r.ok) {
      return r.json().then(function(e) {
        throw new Error(e.detail || 'Login failed');
      });
    }
    return r.json();
  }).then(function(data) {
    if (!data) return;
    if (data && data.token) {
      localStorage.setItem('gt_token', data.token);
      if (data.user) localStorage.setItem('gt_user', JSON.stringify(data.user));
      // Clean URL before redirect
      var clean = window.location.origin + '/dashboard.html';
      window.location.replace(clean);
    } else {
      window.location.replace('/login.html?error=Invalid+server+response');
    }
  }).catch(function(e) {
    window.location.replace('/login.html?error=' + encodeURIComponent(e.message || 'Login failed'));
  });
})();
</script>
</body>
</html>
