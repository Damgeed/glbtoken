<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer coin ring — open on the right to suggest movement/flow -->
  <path d="M42.5 28.5A21 21 0 1 1 42.5 19.5" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ridges on left edge of coin (minted coin teeth) -->
  <line x1="4" y1="19" x2="7" y2="18.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="3.5" y1="24" x2="6.8" y2="24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="4" y1="29" x2="7" y2="29.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Globe — simplified latitude/longitude -->
  <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="1.4"/>
  <ellipse cx="24" cy="24" rx="8" ry="3" stroke="currentColor" stroke-width="1.1" fill="none"/>
  <ellipse cx="24" cy="24" rx="3.5" ry="8" stroke="currentColor" stroke-width="1.1" fill="none"/>
  <line x1="24" y1="16" x2="24" y2="32" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Circuit trace 1 (upper-right) -->
  <polyline points="31.5,19 35.5,19 35.5,11 39.5,11" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40.5" cy="11" r="1.6" stroke="currentColor" stroke-width="1.3"/>

  <!-- Circuit trace 2 (middle-right) -->
  <line x1="32" y1="24" x2="39.5" y2="24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="40.5" cy="24" r="1.6" stroke="currentColor" stroke-width="1.3"/>

  <!-- Circuit trace 3 (lower-right) -->
  <polyline points="31.5,29 35.5,29 35.5,37 39.5,37" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40.5" cy="37" r="1.6" stroke="currentColor" stroke-width="1.3"/>
</svg>
