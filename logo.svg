<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Global Token Logo
    Coin + Globe + Circuit
    Geometric, consistent 2.5px stroke, monochrome, works dark/light
  -->

  <!-- Outer coin ring — perfectly circular, open on the right side
       Circle at (24,24) r=20, gap on right ~20% of circumference -->
  <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2.5"
    stroke-dasharray="100.53 25.13" stroke-dashoffset="12.56" stroke-linecap="round"/>

  <!-- Ridges (coin teeth) — 5 small radial notches on the left arc -->
  <line x1="7.1" y1="33.75" x2="4.95" y2="35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="5.2" y1="29.05" x2="2.75" y2="29.69" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="4.5" y1="24" x2="2" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="5.2" y1="18.95" x2="2.75" y2="18.31" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="7.1" y1="14.25" x2="4.95" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Globe — simplified circle with meridian only -->
  <circle cx="24" cy="24" r="7.5" stroke="currentColor" stroke-width="2.5"/>
  <line x1="24" y1="16.5" x2="24" y2="31.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Circuit trace 1 (upper-right) -->
  <polyline points="30.7,18.7 35,18.7 35,10 39,10" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40" cy="10" r="1.5" stroke="currentColor" stroke-width="2.5"/>

  <!-- Circuit trace 2 (middle-right) -->
  <line x1="31.5" y1="24" x2="39" y2="24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="24" r="1.5" stroke="currentColor" stroke-width="2.5"/>

  <!-- Circuit trace 3 (lower-right) -->
  <polyline points="30.7,29.3 35,29.3 35,38 39,38" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40" cy="38" r="1.5" stroke="currentColor" stroke-width="2.5"/>
</svg>
