<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="36" height="36">
  <!-- GlbTOKEN Logo – Bold Geometric Mark -->
  
  <!-- Bold hexagonal shield -->
  <path d="M50 6 L84 25 L84 63 L50 94 L16 63 L16 25 Z" 
        stroke="currentColor" stroke-width="5" fill="none" stroke-linejoin="round"/>
  
  <!-- Bold globe circle -->
  <circle cx="50" cy="48" r="16" stroke="currentColor" stroke-width="4.5" fill="none"/>
  
  <!-- Bold equator line -->
  <line x1="34" y1="48" x2="66" y2="48" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Bold meridian (vertical arc) -->
  <path d="M50 32 Q38 42 38 48 Q38 54 50 64" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M50 32 Q62 42 62 48 Q62 54 50 64" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Bold right circuit trace -->
  <polyline points="78,34 86,34 86,18" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="86" cy="14" r="3.5" stroke="currentColor" stroke-width="4.5" fill="none"/>
  
  <!-- Bold left circuit trace -->
  <polyline points="22,34 14,34 14,18" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="14" cy="14" r="3.5" stroke="currentColor" stroke-width="4.5" fill="none"/>
  
  <!-- Bold bottom-right circuit -->
  <polyline points="78,62 86,62 86,78" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="86" cy="82" r="3.5" stroke="currentColor" stroke-width="4.5" fill="none"/>
  
  <!-- Bold bottom-left circuit -->
  <polyline points="22,62 14,62 14,78" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="14" cy="82" r="3.5" stroke="currentColor" stroke-width="4.5" fill="none"/>
</svg>
