<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — GlbTOKEN</title>
  <link rel="stylesheet" href="style.css?v=225" />
</head>
<body>
<div class="stars-bg"><div class="star gold"></div></div>
<nav class="navbar"><div class="container navbar-inner">
  <a href="/" class="nav-logo notranslate"><span class="logo-full notranslate">GlbTOKEN</span></a>
</div></nav>
<div style="max-width:800px;margin:100px auto;padding:2rem;text-align:center;color:var(--text)">
  <h1 style="color:var(--primary);font-size:2rem">✅ Dashboard is LIVE</h1>
  <p style="color:var(--text-secondary);margin:1rem 0">Backend: 
    <span id="backendStatus" style="font-weight:600">Checking...</span>
  </p>
  <div id="debugData" style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;text-align:left;font-family:monospace;font-size:0.85rem;margin-top:1rem"></div>
</div>
<script>
(async function(){
  var token = localStorage.getItem('gt_token');
  var statusEl = document.getElementById('backendStatus');
  var dataEl = document.getElementById('debugData');
  
  if (!token) {
    statusEl.textContent = '❌ No token - please login first';
    statusEl.style.color = '#FF6B6B';
    dataEl.textContent = 'No auth token found in localStorage. Login at /login.html';
    return;
  }
  
  try {
    var resp = await fetch('https://glbtoken-backend-production.up.railway.app/api/dashboard?days=7', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    var data = await resp.json();
    statusEl.textContent = '✅ Connected (' + resp.status + ')';
    statusEl.style.color = '#00D68F';
    dataEl.textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
    statusEl.style.color = '#FF6B6B';
    dataEl.textContent = 'Error: ' + e.toString() + '\n\nCORS headers from response: ' + (resp ? resp.headers.get('Access-Control-Allow-Origin') : 'N/A');
  }
})();
</script>
</body>
</html>
